<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Rock Paper Scissors</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #dbeafe, #f0f9ff);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .game-container {
      background: white;
      padding: 35px;
      border-radius: 20px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.15);
      text-align: center;
      width: 90%;
      max-width: 500px;
    }

    h1 {
      margin-top: 0;
      color: #1e3a8a;
      font-size: 2rem;
    }

    p {
      color: #374151;
      font-size: 1.05rem;
    }

    .buttons {
      display: flex;
      gap: 12px;
      justify-content: center;
      flex-wrap: wrap;
      margin: 25px 0;
    }

    button {
      padding: 12px 20px;
      font-size: 1rem;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      background: #2563eb;
      color: white;
      transition: 0.2s;
    }

    button:hover:not(:disabled) {
      background: #1d4ed8;
      transform: scale(1.05);
    }

    button:disabled {
      background: #9ca3af;
      cursor: not-allowed;
    }

    .results {
      margin-top: 20px;
      font-size: 1.1rem;
      color: #111827;
    }

    .scoreboard {
      margin-top: 20px;
      font-size: 1.2rem;
      font-weight: bold;
      color: #1f2937;
    }

    .winner-message {
      margin-top: 20px;
      font-size: 1.3rem;
      font-weight: bold;
      color: #15803d;
    }

    .reset-btn {
      margin-top: 20px;
      background: #16a34a;
    }

    .reset-btn:hover {
      background: #15803d;
    }
  </style>
</head>
<body>
  <div class="game-container">
    <h1>Rock Paper Scissors</h1>
    <p>Select rock, paper, or scissors:</p>

    <div class="buttons">
      <button onclick="playGame('rock')">Rock</button>
      <button onclick="playGame('paper')">Paper</button>
      <button onclick="playGame('scissors')">Scissors</button>
    </div>

    <div class="results">
      <p id="playerChoice">Your choice: -</p>
      <p id="computerChoice">Computer choice: -</p>
      <p id="roundResult">Result: -</p>
    </div>

    <div class="scoreboard">
      <p>Your Score: <span id="playerScore">0</span></p>
      <p>Computer Score: <span id="computerScore">0</span></p>
    </div>

    <div class="winner-message" id="winnerMessage"></div>

    <button class="reset-btn" onclick="resetGame()">Restart Game</button>
  </div>

  <script>
    let playerScore = 0;
    let computerScore = 0;
    let gameOver = false;

    function playGame(playerChoice) {
      if (gameOver) return;

      const choices = ['rock', 'paper', 'scissors'];
      const computerChoice = choices[Math.floor(Math.random() * choices.length)];

      document.getElementById('playerChoice').textContent = 'Your choice: ' + capitalize(playerChoice);
      document.getElementById('computerChoice').textContent = 'Computer choice: ' + capitalize(computerChoice);

      let result = '';

      if (playerChoice === computerChoice) {
        result = "It's a tie! No points awarded.";
      } else if (
        (playerChoice === 'rock' && computerChoice === 'scissors') ||
        (playerChoice === 'paper' && computerChoice === 'rock') ||
        (playerChoice === 'scissors' && computerChoice === 'paper')
      ) {
        result = 'You win this round!';
        playerScore++;
      } else {
        result = 'Computer wins this round!';
        computerScore++;
      }

      document.getElementById('roundResult').textContent = 'Result: ' + result;
      document.getElementById('playerScore').textContent = playerScore;
      document.getElementById('computerScore').textContent = computerScore;

      if (playerScore === 5) {
        document.getElementById('winnerMessage').textContent = 'You won the game!';
        endGame();
      } else if (computerScore === 5) {
        document.getElementById('winnerMessage').textContent = 'Computer won the game!';
        endGame();
      }
    }

    function endGame() {
      gameOver = true;
      const buttons = document.querySelectorAll('.buttons button');
      buttons.forEach(button => button.disabled = true);
    }

    function resetGame() {
      playerScore = 0;
      computerScore = 0;
      gameOver = false;

      document.getElementById('playerChoice').textContent = 'Your choice: -';
      document.getElementById('computerChoice').textContent = 'Computer choice: -';
      document.getElementById('roundResult').textContent = 'Result: -';
      document.getElementById('playerScore').textContent = '0';
      document.getElementById('computerScore').textContent = '0';
      document.getElementById('winnerMessage').textContent = '';

      const buttons = document.querySelectorAll('.buttons button');
      buttons.forEach(button => button.disabled = false);
    }

    function capitalize(word) {
      return word.charAt(0).toUpperCase() + word.slice(1);
    }
  </script>
</body>
</html>
